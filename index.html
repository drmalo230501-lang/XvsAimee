<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación XV - Aimeé</title>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #f3cdff;
      --bg-mid: #d4bfff;
      --bg-bottom: #c6f2f4;
      --violet: #7d39a5;
      --violet-strong: #5f2588;
      --violet-soft: #b87ada;
      --aqua: #7fd4ef;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      color: var(--violet-strong);
      background: linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
      overflow-x: hidden;
    }

    .envelope {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #f8e4ff 0%, #d0adf2 65%, #b494df 100%);
      cursor: pointer;
    }

    .envelope::before {
      content: "💌";
      font-size: 88px;
      animation: float 1.5s ease-in-out infinite;
      filter: drop-shadow(0 10px 16px rgba(84, 30, 120, 0.25));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .invitation {
      display: none;
      min-height: 100vh;
      padding: 14px 10px 20px;
    }

    .card {
      width: min(100%, 430px);
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.7);
      background:
        radial-gradient(circle at 88% 84%, rgba(255, 188, 242, .48), transparent 38%),
        radial-gradient(circle at 15% 12%, rgba(255, 226, 247, .55), transparent 42%),
        linear-gradient(180deg, #ebcdff 0%, #cab8ff 45%, #cbf4f4 78%, #dbcfff 100%);
      box-shadow: 0 16px 34px rgba(82, 38, 116, .22);
      isolation: isolate;
    }

    .sparkles,
    .sparkles::before,
    .sparkles::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,.92) 1.4px, transparent 2px);
      background-size: 40px 40px;
      opacity: .45;
      z-index: 1;
    }

    .sparkles::before { transform: translateY(12px); background-size: 66px 66px; opacity: .28; }
    .sparkles::after { transform: translateX(18px); background-size: 80px 80px; opacity: .22; }

    .balloon {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: inset -8px -10px 14px rgba(85, 42, 130, .15);
      z-index: 2;
    }

    .left-1 { width: 128px; height: 128px; left: -58px; top: 26px; background: radial-gradient(circle at 30% 30%, #ffe3ff, #ce8ee0 66%, #8d4fba); }
    .left-2 { width: 94px; height: 94px; left: -14px; top: 44px; background: radial-gradient(circle at 30% 30%, #ffedf9, #efb9ea 65%, #c084d5); }
    .right-1 { width: 128px; height: 128px; right: -58px; top: 104px; background: radial-gradient(circle at 30% 30%, #f5ffff, #8edff8 62%, #39acd9); }
    .right-2 { width: 94px; height: 94px; right: -14px; top: 88px; background: radial-gradient(circle at 30% 30%, #f2ffff, #d9fbff 64%, #a0d5f2); }

    .header {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 18px 14px 0;
    }

    .xv-title {
      margin: 0;
      font-family: 'Cinzel', serif;
      color: var(--violet);
      text-transform: uppercase;
      letter-spacing: 1.6px;
      font-size: clamp(36px, 11vw, 62px);
      text-shadow: 0 3px 0 #efccff, 0 8px 14px rgba(91, 41, 125, .3);
    }

    .name {
      margin: 4px 0 0;
      font-family: 'Alex Brush', cursive;
      font-size: clamp(68px, 18vw, 108px);
      line-height: .92;
      color: #8b40b0;
      text-shadow: 0 3px 0 #f5d8ff, 0 10px 20px rgba(106, 49, 142, .34);
    }

    .content {
      position: relative;
      z-index: 3;
      padding: 6px 14px 22px;
    }

    .cloud {
      border-radius: 30px;
      background: radial-gradient(circle at 25% 30%, #f3ffff, #cdf6f7 64%, #b5edf1 100%);
      padding: 18px 16px 22px;
      box-shadow: inset 0 8px 20px rgba(255,255,255,.55), 0 10px 24px rgba(71, 118, 143, .2);
    }

    .date-badge {
      width: 100%;
      margin: 0 0 14px;
      border-radius: 18px;
      padding: 10px 12px;
      text-align: center;
      color: var(--white);
      background: linear-gradient(160deg, #8b5be6 0%, #a94dca 55%, #6f3fb2 100%);
      box-shadow: 0 8px 16px rgba(92, 43, 132, .28);
      text-transform: uppercase;
      letter-spacing: .7px;
    }

    .date-badge .line-top { font-size: 13px; font-weight: 700; }
    .date-badge .line-main { font-size: 28px; font-weight: 700; margin: 2px 0; }
    .date-badge .line-bottom { font-size: 15px; font-weight: 700; }

    .info-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 11px;
      color: #7b319a;
    }

    .icon {
      width: 30px;
      text-align: center;
      font-size: 25px;
      line-height: 1;
      margin-top: 1px;
      cursor: pointer;
    }

    .main-time {
      font-size: 29px;
      line-height: 1.06;
      font-weight: 700;
      color: #973db0;
    }

    .detail {
      font-size: 14px;
      line-height: 1.32;
      font-weight: 500;
    }

    .map-link,
    .wa-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed rgba(121, 50, 153, .45);
      cursor: pointer;
    }

    .wa-button {
      margin-top: 9px;
      border: none;
      border-radius: 999px;
      padding: 10px 15px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #a047ca, #7d35aa);
      box-shadow: 0 8px 16px rgba(95, 42, 132, .3);
      cursor: pointer;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-family: 'Alex Brush', cursive;
      font-size: 54px;
      color: #8b3fb0;
      text-shadow: 0 2px 0 #f3d8ff;
    }

    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.16), transparent 24%),
        radial-gradient(circle at 83% 41%, rgba(255,255,255,.15), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255,255,255,.12), transparent 25%);
    }

    @media (min-width: 560px) {
      .invitation { padding-top: 24px; }
      .card { width: min(100%, 620px); }
      .cloud { border-radius: 44% 56% 45% 55% / 44% 45% 55% 56%; padding: 24px 20px 28px; }
      .date-badge { max-width: 340px; margin: 0 auto 14px; }
      .info-row { max-width: 430px; margin-left: auto; margin-right: auto; }
      .footer { font-size: 64px; }
    }
  </style>
</head>
<body>
  <div class="envelope" onclick="openInvite()" aria-label="Abrir invitación"></div>

  <main class="invitation" id="invitation">
    <section class="card">
      <div class="sparkles"></div>

      <div class="balloon left-1"></div>
      <div class="balloon left-2"></div>
      <div class="balloon right-1"></div>
      <div class="balloon right-2"></div>

      <header class="header">
        <h2 class="xv-title">Mis XV’s</h2>
        <h1 class="name">Aimeé</h1>
      </header>

      <section class="content">
        <div class="cloud">
          <div class="date-badge">
            <div class="line-top">Sábado</div>
            <div class="line-main">18 de Abril</div>
            <div class="line-bottom">2026</div>
          </div>

          <div class="info-row">
            <span class="icon">⏰</span>
            <div class="main-time">Misa 12:30 PM</div>
          </div>

          <div class="info-row">
            <span class="icon" onclick="openMap()" title="Abrir ubicación">📍</span>
            <div class="detail">
              <a class="map-link" onclick="openMap()">C 5 OTE. 810, La Magdalena Axocopan, 74365 Atlixco, Pue.</a>
            </div>
          </div>

          <div class="info-row">
            <span class="icon" onclick="confirmWhatsApp()" title="Confirmar por WhatsApp">📞</span>
            <div class="detail">
              <a class="wa-link" onclick="confirmWhatsApp()">Confirmar asistencia al 2223248799 · 2225088839</a><br />
              <button class="wa-button" type="button" onclick="confirmWhatsApp()">💬 Confirmar por WhatsApp</button>
            </div>
          </div>

          <div class="footer">¡Te esperamos!</div>
        </div>
      </section>
    </section>
  </main>

  <div class="glow"></div>

  <script>
    function openInvite() {
      document.querySelector('.envelope').style.display = 'none';
      document.getElementById('invitation').style.display = 'block';
    }

    function openMap() {
      window.open('https://www.google.com/maps/search/?api=1&query=C+5+OTE+810+La+Magdalena+Axocopan+Atlixco+Puebla', '_blank');
    }

    function confirmWhatsApp() {
      const phone = '522223248799';
      const message = encodeURIComponent('Hola, confirmo mi asistencia a los XV de Aimeé');
      window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
  </script>
</body>
</html>
